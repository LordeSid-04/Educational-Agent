name: ChalkMind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & Test Server ──
  server:
    name: Server Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        working-directory: server
        run: npm ci

      - name: Lint Check
        working-directory: server
        run: echo "Lint passed (no linter configured yet)"

  # ── Build Client ──
  client:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        working-directory: client
        run: npm ci

      - name: Build Production Bundle
        working-directory: client
        run: npm run build

  # ── Docker Build ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Compose
        run: docker compose build

      - name: Verify Containers Start
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:3001/api/health || exit 1
          docker compose down
